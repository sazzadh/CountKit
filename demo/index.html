<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>CountKit Demo</title>

  <style>
    body{
      margin:0;
      padding:40px;

      min-height:100vh;

      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;

      font-family:Arial,sans-serif;

      background:#f5f5f5;
    }

    h1{
      margin-bottom:40px;

      font-size:42px;
      font-weight:700;

      color:#222;
    }

    .demo-section{
      margin-bottom:60px;

      text-align:center;
    }

    .demo-label{
      margin-bottom:20px;

      font-size:14px;
      letter-spacing:2px;
      text-transform:uppercase;

      color:#777;
    }

    #offer-banner{
      margin-top:30px;

      padding:20px 30px;

      border-radius:12px;

      background:#fff;

      box-shadow:0 10px 30px rgba(0,0,0,.05);

      color:#222;
    }
  </style>
</head>

<body>

  <h1>CountKit.js Demo</h1>

  <!-- ===================================== -->
  <!-- DEFAULT TIMER -->
  <!-- ===================================== -->
  <div class="demo-section">

    <div class="demo-label">
      Default Timer
    </div>

    <div
      class="countkit"

      data-date="2026-05-10"
      data-time="23:59:59"
    ></div>

  </div>

  <!-- ===================================== -->
  <!-- CUSTOM STYLE TIMER -->
  <!-- ===================================== -->
  <div class="demo-section">

    <div class="demo-label">
      Custom Styled Timer
    </div>

    <div
      class="countkit"

      data-date="2026-12-31"
      data-time="23:59:59"

      data-text-color="#111111"
      data-label-color="#999999"

      data-divider-color="rgba(0,0,0,.2)"

      data-number-size="72"
      data-label-size="14"

      data-gap="24"
    ></div>

  </div>

  <!-- ===================================== -->
  <!-- AUTO HIDE EXAMPLE -->
  <!-- ===================================== -->
  <div class="demo-section">

    <div class="demo-label">
      Auto Hide Example
    </div>

    <div
      class="countkit"

      data-date="2026-01-01"
      data-time="23:59:59"

      data-hide-on-end="true"

      data-hide-ids="#offer-banner"

      data-expired-text="Offer Ended"
    ></div>

    <div id="offer-banner">
      🎉 Limited Time Offer Banner
    </div>

  </div>

  <!-- ===================================== -->
  <!-- COUNTKIT SCRIPT -->
  <!-- ===================================== -->

  <!-- Local -->
  <script src="./countkit.min.js"></script>

  <!-- CDN Example -->
  <!--
  <script src="https://cdn.jsdelivr.net/gh/sazzadh/CountKit@1.0/CountKit.min.js"></script>
  -->

</body>
</html>
